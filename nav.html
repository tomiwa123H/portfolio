<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* RESET */
body { margin:0; font-family: Helvetica, Arial, sans-serif; }

/* NAV BAR */
.nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid #eee;
}

.nav-inner {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 1rem 3rem;
}

/* LEFT */
.nav-left button {
  background: none;
  border: none;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  cursor: pointer;
}

/* LOGO */
.nav-logo {
  text-align: center;
  font-weight: 700;
  letter-spacing: 3px;
}

/* RIGHT */
.nav-right {
  justify-self: end;
}

.nav-right span {
  margin-left: 1.5rem;
  font-size: 0.85rem;
  cursor: pointer;
  position: relative;
}

.nav-right span::after {
  content:"";
  position:absolute;
  bottom:-3px;
  left:0;
  width:0%;
  height:1px;
  background:black;
  transition:0.3s;
}

.nav-right span:hover::after {
  width:100%;
}

/* MOBILE MENU */
.menu {
  position: fixed;
  top:0;
  left:-100%;
  width:300px;
  height:100vh;
  background:white;
  padding:4rem 2rem;
  transition:0.4s;
  display:flex;
  flex-direction:column;
  gap:1.5rem;
  z-index:999;
}

.menu.active { left:0; }

.menu a {
  text-decoration:none;
  font-size:1.2rem;
  color:black;
}

/* CART DRAWER */
.cart {
  position: fixed;
  top:0;
  right:-100%;
  width:350px;
  height:100vh;
  background:white;
  padding:2rem;
  transition:0.4s;
  z-index:999;
  border-left:1px solid #eee;
}

.cart.active { right:0; }

/* SEARCH OVERLAY */
.search {
  position: fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:999;
}

.search.active {
  opacity:1;
  pointer-events:auto;
}

.search input {
  width:60%;
  padding:1rem;
  font-size:1.2rem;
  border:none;
  border-bottom:2px solid black;
  outline:none;
}

/* CLOSE BTN */
.close {
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:1.2rem;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">

    <div class="nav-left">
      <button onclick="toggleMenu()">MENU</button>
    </div>

    <div class="nav-logo">AURELIA</div>

    <div class="nav-right">
      <span onclick="toggleSearch()">Search</span>
      <span onclick="toggleCart()">Cart</span>
    </div>

  </div>
</div>

<!-- MENU -->
<div class="menu" id="menu">
  <div class="close" onclick="toggleMenu()">✕</div>
  <a href="#">New</a>
  <a href="#">Collection</a>
  <a href="#">Trousers</a>
  <a href="#">Outerwear</a>
  <a href="#">Accessories</a>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <div class="close" onclick="toggleCart()">✕</div>
  <h2>Your Cart</h2>
  <p>No items yet.</p>
</div>

<!-- SEARCH -->
<div class="search" id="search">
  <div class="close" onclick="toggleSearch()">✕</div>
  <input type="text" placeholder="Search products...">
</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

function toggleSearch() {
  document.getElementById("search").classList.toggle("active");
}
</script>

</body>
</html>
